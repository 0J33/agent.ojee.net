services:
  caddy:
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # Bind Caddy to BIND_IP (defaults to localhost).  Set it to your
    # Tailscale IP in .env to make the stack tailnet-only, or 0.0.0.0
    # to expose it publicly.
    ports:
      - "${BIND_IP:-127.0.0.1}:80:80"
      - "${BIND_IP:-127.0.0.1}:443:443"
      - "${BIND_IP:-127.0.0.1}:443:443/udp"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - ACME_EMAIL=${ACME_EMAIL:-you@example.com}
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN:-agent.example.com}
      - N8N_DOMAIN=${N8N_DOMAIN:-flow.agent.example.com}
      - COUCHDB_DOMAIN=${COUCHDB_DOMAIN:-sync.agent.example.com}
      - ODYSSEUS_DOMAIN=${ODYSSEUS_DOMAIN:-odysseus.agent.example.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - dashboard
      - n8n
      - couchdb

  dashboard:
    build: ./dashboard
    container_name: dashboard
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-insecure-default-change-me}
      - DASHBOARD_BASE_URL=${DASHBOARD_BASE_URL:-https://${DASHBOARD_DOMAIN:-agent.example.com}}
      - N8N_DOMAIN=${N8N_DOMAIN:-flow.agent.example.com}
      - COUCHDB_DOMAIN=${COUCHDB_DOMAIN:-sync.agent.example.com}
      - ODYSSEUS_DOMAIN=${ODYSSEUS_DOMAIN:-}
      - TIMEZONE=${TIMEZONE:-UTC}
      - CODE_AGENT_URL=${CODE_AGENT_URL:-}
      - CODE_AGENT_TOKEN=${CODE_AGENT_TOKEN:-}
      # NVIDIA_VISIBLE_DEVICES + runtime: nvidia let the dashboard's
      # /api/stats endpoint exec nvidia-smi for the GPU gauge.  Leave the
      # NVIDIA_* vars set to "" if you don't have a GPU — the container
      # will start fine without the runtime.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    runtime: ${DOCKER_RUNTIME:-runc}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/host-tmp:ro
      # Host path to this stack/ checkout — the dashboard chat reads
      # docker-compose.yml etc. from /host-stack inside the container.
      - ${HOST_STACK_PATH:-./}:/host-stack:ro
      - /:/host:ro
      - dashboard_data:/app/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=${N8N_DOMAIN:-flow.agent.example.com}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN:-flow.agent.example.com}
      - WEBHOOK_URL=https://${N8N_DOMAIN:-flow.agent.example.com}
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

  # Obsidian vault backend — Self-hosted LiveSync plugin replicates
  # against CouchDB over HTTPS at $COUCHDB_DOMAIN.  CORS + max-body-size
  # tweaks are applied at runtime by ./couchdb/init.sh via the HTTP
  # config API, not via a mounted local.ini.
  couchdb:
    image: couchdb:3
    container_name: couchdb
    restart: unless-stopped
    expose:
      - "5984"
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-obsidian}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-change-me}
    volumes:
      - couchdb_data:/opt/couchdb/data

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  dashboard_data:
  couchdb_data:
