services:
  caddy:
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # Bind Caddy only to tailnet IP — prevents access from local wifi network or public internet.
    # Tailnet IP is stable; if it ever changes, update here and in the Cloudflare CNAME.
    ports:
      - "100.117.98.52:80:80"
      - "100.117.98.52:443:443"
      - "100.117.98.52:443:443/udp"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - dashboard
      - openwebui
      - n8n
      - couchdb

  # Kept for legacy tailnet URL access (tailscale serve → 127.0.0.1:8000)
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - openwebui
      - n8n

  dashboard:
    build: ./dashboard
    container_name: dashboard
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-insecure-default-change-me}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY:-}
      - CODE_AGENT_URL=${CODE_AGENT_URL:-http://100.81.241.55:7777}
      - CODE_AGENT_TOKEN=${CODE_AGENT_TOKEN:-}
      - LOQ_OLLAMA_URL=${LOQ_OLLAMA_URL:-http://100.81.241.55:11434}
      - LOQ_CONTROL_URL=${LOQ_CONTROL_URL:-http://100.81.241.55:7779}
      - LOQ_CONTROL_TOKEN=${LOQ_CONTROL_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    runtime: nvidia
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/host-tmp:ro
      - /home/ojee/stack:/host-stack:ro
      - /:/host:ro
      - dashboard_data:/app/data

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=true
      - WEBUI_URL=https://chat.agent.ojee.net
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
      - ENABLE_RAG_LOCAL_WEB_FETCH=True
      - ENABLE_CODE_INTERPRETER=True
      - CODE_EXECUTION_ENGINE=pyodide
      - DEFAULT_MODELS=llama3.1:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui_data:/app/backend/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=flow.agent.ojee.net
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://flow.agent.ojee.net
      - WEBHOOK_URL=https://flow.agent.ojee.net
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Africa/Cairo
      - TZ=Africa/Cairo
    volumes:
      - n8n_data:/home/node/.n8n

  # Obsidian vault backend — Self-hosted LiveSync plugin replicates
  # against CouchDB over HTTPS at sync.agent.ojee.net.  The required
  # CORS + max-body-size tweaks are applied at runtime by ./couchdb/init.sh
  # via the HTTP config API, not via a mounted local.ini.
  couchdb:
    image: couchdb:3
    container_name: couchdb
    restart: unless-stopped
    expose:
      - "5984"
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-obsidian}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-change-me}
    volumes:
      - couchdb_data:/opt/couchdb/data

volumes:
  openwebui_data:
  n8n_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  dashboard_data:
  couchdb_data:
